name: Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'tests/**/*.py'
      - 'tests/**/*_tests.py'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest --cov=. --cov-report=xml --cov-report-file=coverage.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v3
        with:
          name: coverage
          path: coverage.xml
