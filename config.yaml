# TG AI Poster Configuration
# ===========================

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  channel_id: "${TELEGRAM_CHANNEL_ID}"
  posting_mode: "bot"

telethon:
  api_id: "${TELETHON_API_ID}"
  api_hash: "${TELETHON_API_HASH}"
  phone: "${TELETHON_PHONE}"
  session_path: "sessions/user.session"

llm:
  # GLM-5 через Claude Code CLI (использует Coding Plan)
  # GLM-5 доступен через z.ai API или Claude Code CLI
  provider: "claude-cli"
  model: "glm-5"
  max_tokens: 2000
  # Temperature зависит on post type:
  # - 0.15 for factual/breaking news (default)
  # - 0.4 for analysis/deep_dive posts
  temperature: 0.15
  temperature_analysis: 0.4

channel:
  topic: "AI technologies and future of automation"
  style: >
    Expert but accessible. Think pieces. No hype.
    Focus on practical insights and thought-provoking analysis.
  language: "ru"
  # Updated for v2.0 pipeline
  post_length_min: 200
  post_length_max: 4096
  emojis_per_post: 3
  hashtags_count: 3

schedule:
  type: "fixed"
  timezone: "Europe/Moscow"
  fixed_times:
    - "07:00"
    - "09:30"
    - "12:00"
    - "14:00"
    - "16:30"
    - "19:00"
    - "20:00"
    - "21:00"
    - "21:30"
    - "22:30"
    - "23:30"
    - "23:50"
  max_daily_posts: 50                # Увеличен для continuous режима
  min_interval_minutes: 5            # Минимальный интервал между постами

# Real-Time News Monitoring (непрерывный режим)
realtime:
  enabled: true                      # Включить непрерывный мониторинг
  poll_interval_minutes: 10          # Проверять источники каждые 10 минут
  auto_post: true                    # Автоматически публиковать новости
  breaking_threshold: 5              # Порог приоритета для автопостинга (1-10, ниже = чаще)
  min_post_interval_minutes: 15      # Минимум 15 минут между автопостами (лимит валидации)

sources:
  max_article_age_days: 2  # Только свежие новости (до 2 дней)
  rss_feeds:
    # === TECH NEWS ===
    - "https://www.producthunt.com/feed"
    - "https://hnrss.org/frontpage"
    - "https://techcrunch.com/feed/"
    - "https://www.theverge.com/ai-artificial-intelligence/rss/index.xml"
    - "https://feeds.arstechnica.com/arstechnica/technology-lab"
    - "https://www.wired.com/feed/tag/ai/latest/rss"
    - "https://www.technologyreview.com/feed/"

    # === AI COMPANIES ===
    - "https://openai.com/blog/rss.xml"
    - "https://deepmind.google/discover/blog/rss/"
    - "https://blog.google/technology/ai/rss/"

    # === RUSSIAN SOURCES ===
    - "https://vc.ru/rss"
    - "https://incrussia.ru/feed/"
    - "https://habr.com/ru/rss/articles/"
    - "https://naked-science.ru/feed"
    - "https://rb.ru/feeds/rss"

    # === AI/ML NEWS ===
    - "https://www.reddit.com/r/artificial/.rss"
    - "https://www.reddit.com/r/ChatGPT/.rss"
    - "https://www.reddit.com/r/MachineLearning/.rss"
    - "https://www.artificialintelligence-news.com/feed"
    - "https://venturebeat.com/category/ai/feed/"

    # === RESEARCH ===
    - "https://huggingface.co/blog/feed.xml"
    - "https://distill.pub/rss.xml"

  use_hackernews: true
  use_producthunt: true
  enable_rss: true
  rss_fetch_interval_hours: 6
  max_article_age_days: 2  # Only fresh news (max 2 days)

  # === NEW API SOURCES ===
  newsapi:
    enabled: false  # Requires API key
    api_key: "${NEWSAPI_KEY:-}"
    query: "artificial intelligence OR machine learning OR AI"
    language: "en"
    page_size: 20

  arxiv:
    enabled: true
    categories:
      - "cs.AI"
      - "cs.LG"
      - "cs.CL"
    max_results: 15

  gdelt:
    enabled: false  # Experimental
    themes:
      - "artificial_intelligence"
      - "machine_learning"

safety:
  manual_approval: false
  forbidden_words: []
  similarity_threshold: 0.85
  max_regeneration_attempts: 3
  min_interval_minutes: 5            # Уменьшен для непрерывного режима
  max_daily_posts: 50                # Увеличен для непрерывного режима

learning:                            # ← ДОБАВЛЕН БЛОК
  feedback_enabled: true
  style_update_interval_days: 7
  min_reactions_to_learn: 5
  top_posts_in_context: 5

database:
  url: "sqlite+aiosqlite:///./data/tg_poster.db"   # ← async драйвер
  echo: false

redis:
  enabled: false
  url: "redis://localhost:6379/0"

admin:
  telegram_id: "${ADMIN_TELEGRAM_ID}"
  notify_on_error: true
  notify_on_post: false

# ===================================
# Quick Wins Features
# ===================================

# Health Monitoring
health:
  check_on_startup: true
  check_before_post: true
  endpoint_enabled: false
  endpoint_port: 8080

# Audit Logging
audit:
  enabled: true
  retention_days: 90

# Weekly Reports
reporting:
  enabled: true
  schedule: "0 9 * * 1"  # Monday 9 AM
  recipient_admin_id: "${ADMIN_TELEGRAM_ID}"

# Post Templates
templates:
  enabled: true
  path: "config/post_templates.yaml"

# Poll Generation
polls:
  enabled: true
  probability: 0.3  # 30% of posts as polls

# ===================================
# Phase 1 Features
# ===================================

# Approval Workflow
approval:
  auto_approve_enabled: true
  min_quality_score: 0.75
  min_verification_score: 0.70
  min_editor_score: 0.70
  max_regeneration_attempts: 3

# A/B Testing
ab_testing:
  enabled: true
  default_traffic_split: 0.5
  min_sample_size: 100
  confidence_threshold: 0.95
  auto_select_winner: true

# Draft System
draft:
  max_versions: 50
  auto_cleanup_days: 30

# ===================================
# Phase 2 Features
# ===================================

# Content Recycling (Feature 1)
recycling:
  enabled: false
  min_age_days: 30
  min_engagement_score: 0.7
  min_rewrite_ratio: 0.4
  max_candidates_per_run: 5
  schedule_hours: 168  # Weekly

# Multi-Channel Support (Feature 2)
channels:
  enabled: false
  list:
    - id: "main"
      name: "AI News"
      topic: "AI technologies and future of automation"
      language: "ru"
      schedule_type: "fixed"
      schedule_times: ["09:30", "14:00", "20:00"]

app:
  name: "TG AI Poster"
  debug: false
  dry_run: false

media:
    enabled: true
    unsplash_access_key: "${UNSPLASH_ACCESS_KEY}"
    pexels_api_key: "${PEXELS_API_KEY}"